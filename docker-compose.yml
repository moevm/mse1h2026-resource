services:
  redis:
    image: redis:7-alpine
    container_name: resource-redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - data_net
    healthcheck:
      test: [CMD-SHELL, "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  neo4j:
    image: neo4j:5-community
    container_name: resource-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    security_opt:
      - no-new-privileges:true
    networks:
      - data_net
    healthcheck:
      test: [CMD-SHELL, "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} \"RETURN 1\""]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: app/backend.Dockerfile
    container_name: resource-backend
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8000"
    env_file: .env
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 3s  
      timeout: 5s
      retries: 2
      start_period: 3s  
    networks:
      - edge_net
      - data_net

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    container_name: resource-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:8080"
    depends_on:
      backend:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - edge_net

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  edge_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true
